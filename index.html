<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefrey's Tools</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.25rem;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }
  .sub {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .card {
    display: block;
    background: var(--card);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 0.9rem;
    text-decoration: none;
    color: var(--text);
    border: 1px solid #334155;
    transition: border-color 0.15s ease;
  }
  .card:active { border-color: var(--accent); }
  .card h2 {
    font-size: 1.05rem;
    margin: 0 0 0.3rem 0;
  }
  .card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🛠️ Jefrey's Tools</h1>
    <p class="sub">Overzicht van gehoste HTML-tools</p>

    <a class="card" href="data360-flashcards-en.html">
      <h2>Data 360 Flashcards</h2>
      <p>Salesforce Data Cloud / Data 360 leerkaarten</p>
    </a>

    <a class="card" href="wk2026-v3.html">
      <h2>WK 2026 Voorspeltool</h2>
      <p>Groepen, knockout bracket, weighted scoring (let op: live API momenteel niet actief)</p>
    </a>

    <!-- Nieuwe tool? Kopieer een <a class="card"> blok hierboven en pas href/titel/tekst aan -->

    <footer>jefrey.nl</footer>
  </div>
</body>
</html>
