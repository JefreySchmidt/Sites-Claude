<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jefrey.nl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1115;
    --card: #171A20;
    --line: #262B33;
    --text: #E7E9EC;
    --muted: #8A93A1;
    --accent: #C9A227;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding: 48px 16px 32px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif; font-size: clamp(26px, 6vw, 34px);
    margin: 0 0 6px; letter-spacing: -0.01em;
  }
  .sub{ color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .list{ width:100%; max-width: 480px; display:flex; flex-direction:column; gap: 12px; }
  a.item{
    display:flex; align-items:center; gap: 16px;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 18px;
    text-decoration:none; color: var(--text);
    transition: border-color 0.15s, transform 0.1s;
  }
  a.item:hover{ border-color: var(--accent); transform: translateY(-1px); }
  a.item:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }
  .num{
    font-family:'JetBrains Mono', monospace; font-size: 13px; color: var(--accent);
    border: 1px solid var(--line); border-radius: 8px;
    width: 30px; height: 30px; flex: none;
    display:flex; align-items:center; justify-content:center;
  }
  .meta{ flex: 1; min-width:0; }
  .title{ font-family:'Space Grotesk', sans-serif; font-size: 16px; margin-bottom: 2px; }
  .desc{ font-size: 12.5px; color: var(--muted); }
  .arrow{ color: var(--muted); font-family:'JetBrains Mono', monospace; }

  footer{
    margin-top: 40px; color: var(--muted); font-size: 12px;
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="eyebrow">jefrey.nl</div>
  <h1>Study &amp; project tools</h1>
  <div class="sub">Data-Con-101 prep and side projects</div>

  <div class="list">
    <a class="item" href="data360-flashcards.html">
      <div class="num">1</div>
      <div class="meta">
        <div class="title">Data 360 Flashcards</div>
        <div class="desc">106 cards, weighted to the official exam sections</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="item" href="data360-audio-qa.html">
      <div class="num">2</div>
      <div class="meta">
        <div class="title">Data 360 Audio Q&amp;A</div>
        <div class="desc">Hands-free tape-deck player, reads Q&amp;A out loud</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="item" href="wk2026-v3.html">
      <div class="num">3</div>
      <div class="meta">
        <div class="title">WK 2026 Predictions</div>
        <div class="desc">Groups, schedule, standings &amp; bracket</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>

  <footer>jefrey.nl</footer>
</body>
</html>
